{% set name = "rabbitpy" %}
{% set version = "3.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/rabbitpy-{{ version }}.tar.gz
  sha256: 0664ca146869215c602eafab69fccf63ad24710fcc4dd9c9c37b4b1e62fdb9c1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
    - setuptools
  run:
    - python >={{ python_min }}
    - pamqp >=4,<5

test:
  imports:
    - rabbitpy
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://gmr.github.io/rabbitpy/
  summary: A pure python, thread-safe, minimalistic and pythonic RabbitMQ client library
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - akrherz
